name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate documentation
        run: pnpm mintlify validate

  dco-check:
    name: dco-check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check DCO sign-off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Checking commits ${BASE_SHA}..${HEAD_SHA} for DCO sign-off..."
          MISSING=""
          for sha in $(git rev-list "${BASE_SHA}..${HEAD_SHA}"); do
            if ! git log -1 --format='%B' "$sha" | grep -q '^Signed-off-by: '; then
              MISSING="$MISSING $sha"
              echo "FAIL: $(git log -1 --format='%h %s' $sha)"
            else
              echo "  OK: $(git log -1 --format='%h %s' $sha)"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo ""
            echo "The commits above are missing a DCO sign-off."
            echo "Fix with:  git rebase HEAD~N --signoff  (where N = number of commits)"
            exit 1
          fi
          echo "All commits have DCO sign-off."
